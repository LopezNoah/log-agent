name = "opencode-phone-control"
main = "src/index.ts"
compatibility_date = "2026-06-14"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

# FLY_MACHINE_ID is intentionally unset — the Worker resolves the machine by listing
# FLY_APP_NAME's machines, so recreating the box (e.g. a region change) never breaks it.
[vars]
FLY_APP_NAME = "opencode-phone"
FLY_ORG_SLUG = "personal"
FLY_BASE_URL = "https://opencode-phone.fly.dev"
IDLE_STOP_SECONDS = "3600"

[[d1_databases]]
binding = "DB"
database_name = "opencode_phone"
database_id = "8116852a-97ec-4d1c-b7c3-c2a46b65c054"

[[durable_objects.bindings]]
name = "SYNC"
class_name = "SyncHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SyncHub"]

[triggers]
crons = ["*/5 * * * *"]
