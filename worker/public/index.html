<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>opencode phone</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header class="rail-head">
        <div class="brand">opencode<span>phone</span></div>
        <button id="new-session" class="btn primary" title="New session">＋</button>
      </header>
      <div id="session-list" class="session-list"></div>
      <footer class="rail-foot">
        <div class="machine">
          <span id="machine-dot" class="dot"></span>
          <span id="machine-state">…</span>
        </div>
        <div class="rail-actions">
          <button id="machine-toggle" class="btn ghost">Start</button>
          <a class="btn ghost" href="/terminal/" target="_blank" rel="noopener">Terminal ↗</a>
        </div>
        <button id="open-settings" class="btn ghost settings-btn">⚙ Model key</button>
      </footer>
    </aside>

    <main id="main">
      <div id="thread" class="thread">
        <div id="empty" class="empty">
          <h1>opencode phone</h1>
          <p>A cloud computer for your agents. Pick a session or start a new one.</p>
        </div>
      </div>
      <form id="composer" class="composer" hidden>
        <textarea id="input" rows="1" placeholder="Message opencode…  (⌘/Ctrl+Enter to send)"></textarea>
        <button id="send" class="btn primary send" type="submit">Send</button>
      </form>
    </main>
  </div>

  <dialog id="settings">
    <form method="dialog" class="settings-card">
      <h2>Model key</h2>
      <p class="hint" id="settings-status">No key set — using the box default (Ollama).</p>
      <label>Provider
        <select id="settings-provider">
          <option value="anthropic">Anthropic</option>
          <option value="openai">OpenAI</option>
          <option value="openrouter">OpenRouter</option>
          <option value="google">Google</option>
          <option value="groq">Groq</option>
        </select>
      </label>
      <label>API key
        <input id="settings-key" type="password" autocomplete="off" placeholder="sk-…">
      </label>
      <label>Model <span style="text-transform:none">(provider/model)</span>
        <input id="settings-model" type="text" autocomplete="off" placeholder="anthropic/claude-sonnet-4-6">
      </label>
      <p class="hint">Stored encrypted (AES-GCM). Pushed to opencode at runtime — never written to the box's disk.</p>
      <div class="settings-actions">
        <button type="button" id="settings-clear" class="btn ghost">Remove key</button>
        <span style="flex:1"></span>
        <button type="button" id="settings-cancel" class="btn ghost">Cancel</button>
        <button type="button" id="settings-save" class="btn primary">Save</button>
      </div>
    </form>
  </dialog>

  <script src="/app.js" type="module"></script>
</body>
</html>
