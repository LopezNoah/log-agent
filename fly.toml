app = "opencode-phone"
primary_region = "sjc"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = false
  min_machines_running = 0

[[mounts]]
  source = "opencode_data"
  destination = "/home/dev"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
